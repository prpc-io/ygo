name: Mirror to Codeberg

on:
  push:
    branches: [main]
    tags: ['*']
  workflow_dispatch:

jobs:
  mirror:
    name: Sync to codeberg.org/Deln0r/ygo
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Force-push main + tags to Codeberg
        env:
          CODEBERG_TOKEN: ${{ secrets.CODEBERG_TOKEN }}
        run: |
          git push --force "https://Deln0r:${CODEBERG_TOKEN}@codeberg.org/Deln0r/ygo.git" origin/main:main --tags
