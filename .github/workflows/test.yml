name: test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: test (go ${{ matrix.go }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        go: ["1.22", "1.23", "1.24"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go }}
      - name: go mod download
        run: go mod download
      - name: go vet
        run: go vet ./...
      - name: go test
        run: go test -race -coverprofile=coverage.txt -covermode=atomic ./...
      - name: upload coverage
        if: matrix.go == '1.24'
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage.txt

  lint:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
      - uses: golangci/golangci-lint-action@v6
        with:
          # Pinned (not "latest") so local installs of the same version
          # produce identical results. Bump deliberately. See
          # docs/tech-debt.md for the lint-not-enforced history.
          version: v1.64.8

  fixtures:
    name: fixtures (cross-language)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: install yjs and lib0
        working-directory: testdata/gen
        run: npm install
      - name: regenerate lib0 fixtures
        working-directory: testdata/gen
        run: node gen-lib0.mjs
      - name: regenerate yjs-update fixtures
        working-directory: testdata/gen
        run: node gen-yjs-update.mjs
      - name: verify no diff
        run: git diff --exit-code testdata/
      - name: run go tests against fixtures
        run: |
          go test ./internal/lib0/... -run TestFixtures
          go test ./internal/encoding/... -run TestFixtures
