version: 2
updates:
  - package-ecosystem: gomod
    directory: "/"
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    commit-message:
      prefix: "deps"
      include: scope
    labels:
      - dependencies
      - go
    ignore:
      # sqlite 1.51+ requires Go 1.25; project floor is 1.22 (gomobile bind).
      - dependency-name: "modernc.org/sqlite"
        versions: [">=1.51.0"]
      # coder/websocket 1.8.13+ requires Go 1.23; project floor is 1.22.
      - dependency-name: "github.com/coder/websocket"
        versions: [">=1.8.13"]

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    commit-message:
      prefix: "ci"
      include: scope
    labels:
      - dependencies
      - github-actions

  - package-ecosystem: npm
    directory: "/testdata/gen"
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 3
    commit-message:
      prefix: "testdata"
      include: scope
    labels:
      - dependencies
      - javascript
